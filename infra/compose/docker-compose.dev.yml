version: '3.8'

service:
  postgres:
    container_name: postgres_db
    image: postgres:latest
    restart: always
    ports: 
      - "5432:5432"
    environmnet:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: ORBITAL_FORCE
    volumes:
      - ./data:/var/lib/postgresql/data